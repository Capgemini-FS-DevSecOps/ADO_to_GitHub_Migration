# ado2gh — Connection Settings & Phase Thresholds
# Repo lists come from input files, not this file.
# Run: ado2gh discover -c migration.yaml → then select repos into in/repos.txt

global:
  ado_org_url: "https://dev.azure.com/YOUR_ORG"
  gh_org: "your-github-org"
  migration_strategy: mirror    # "mirror" or "gei"
  parallel: 4
  pipeline_parallel: 12
  default_scopes:
    - repo
    - pipelines
    - work_items
    - wiki
    - secrets
    - branch_policies

phases:
  poc:
    repo_cap: 10
    risk_max: 25
    batch_size: 10
    repo_parallel: 2
    pipeline_parallel: 4
    gate_repo_success_pct: 0.90
    gate_pipeline_success_pct: 0.80
  pilot:
    repo_cap: 100
    risk_max: 45
    batch_size: 25
    repo_parallel: 4
    pipeline_parallel: 8
    gate_repo_success_pct: 0.95
    gate_pipeline_success_pct: 0.90
  wave1:
    repo_cap: 500
    risk_max: 65
    batch_size: 50
    repo_parallel: 6
    pipeline_parallel: 12
    gate_repo_success_pct: 0.97
    gate_pipeline_success_pct: 0.95
  wave2:
    repo_cap: 1000
    risk_max: 80
    batch_size: 100
    repo_parallel: 8
    pipeline_parallel: 16
    gate_repo_success_pct: 0.98
    gate_pipeline_success_pct: 0.97
  wave3:
    repo_cap: 999999
    risk_max: 100
    batch_size: 500
    repo_parallel: 8
    pipeline_parallel: 16
    gate_repo_success_pct: 0.98
    gate_pipeline_success_pct: 0.97
